name: Deploy WebGl

on:
  workflow_call:
    inputs:
      env:
        required: true
        type: string
      s3Bucket:
        required: true
        type: string
      buildName:
        required: true
        type: string
      cache-key:
        required: true
        type: string
      slack_channel:
        required: true
        type: string

permissions:
    id-token: write
    contents: read

jobs:
  webgl-deploy: # Not saving output in Pull Request Build.
    name: WebGL deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            audience: sts.amazonaws.com
            aws-region: ap-southeast-1
            role-to-assume: arn:aws:iam::920373033982:role/oidc-staging-github-actions-role

      - name: Upload to S3 bucket
        run: |
          aws s3 sync --delete --exclude "*.br" ./${{ inputs.buildName }}/${{ inputs.buildName }} s3://${{ inputs.s3Bucket }}/${{ inputs.buildName }}

          aws s3 sync --delete --include "*.br" ./${{ inputs.buildName }}/${{ inputs.buildName }} s3://${{ inputs.s3Bucket }}/${{ inputs.buildName }} \
            --metadata-directive REPLACE \
            --content-encoding br
          
          aws s3 sync ./${{ inputs.buildName }}/${{ inputs.buildName }} s3://${{ inputs.s3Bucket }}/archive/${{ inputs.buildName }}/${{ github.sha }}

          # Copy the config file
          aws s3 cp s3://${{ inputs.s3Bucket }}/config/${{ inputs.env }}/beConfig.json s3://${{ inputs.s3Bucket }}/${{ inputs.buildName }}/StreamingAssets/beConfig.json

      - name: Invalidate Cloudfront Cache
        run: |
            aws cloudfront create-invalidation --distribution-id ${{ inputs.cache-key }} --paths "/${{ inputs.buildName }}/*"

      - name: Update Deployment Version
        if: success()
        run: |
          # Download current deployment version file
          aws s3 cp s3://${{ inputs.s3Bucket }}/archive/${{ inputs.buildName }}/deploymentVersion.json deploymentVersion.json
          
          # Read current deployment info
          CURRENT_COMMIT=$(jq -r '.environments.staging.currentDeployment.commit' deploymentVersion.json)
          CURRENT_TIMESTAMP=$(jq -r '.environments.staging.currentDeployment.timestamp' deploymentVersion.json)
          
          # Update previous deployment with current values
          jq --arg commit "$CURRENT_COMMIT" --arg timestamp "$CURRENT_TIMESTAMP" \
            '.environments.staging.previousDeployment.commit = $commit | .environments.staging.previousDeployment.timestamp = $timestamp' \
            deploymentVersion.json > temp.json && mv temp.json deploymentVersion.json
          
          # Update current deployment with new values
          CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          jq --arg commit "${{ github.sha }}" --arg timestamp "$CURRENT_TIME" \
            '.environments.staging.currentDeployment.commit = $commit | .environments.staging.currentDeployment.timestamp = $timestamp' \
            deploymentVersion.json > temp.json && mv temp.json deploymentVersion.json
          
          # Upload updated deployment version file
          aws s3 cp deploymentVersion.json s3://${{ inputs.s3Bucket }}/archive/${{ inputs.buildName }}/deploymentVersion.json

      - name: Send Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: ${{ inputs.slack_channel }}
          slack-message: |
            *Service Deployment Status*: ${{ job.status == 'success' && '✅ Success' || '❌ Failure' }}
            *Service*: ${{ inputs.buildName }}
            *Environment*: ${{ inputs.env }}
            *Commit*: ${{ github.sha }}
            *Game URL*: https://staging.games.lt.a28.io/${{ inputs.buildName }}/index.html
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
